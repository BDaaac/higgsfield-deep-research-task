id: tool_sequence_r1_mass
description: >
  Tool sequence assertion: agent must follow the required search → fetch → finish pattern.
  Answer is straightforward (38 kg from acme-r1-specs) so it should not skip any step.
tags: [tool_sequence, acme, specs]
input: "What is the mass of the Acme R1 robot in kilograms?"

hard_assertions:
  - check: tool_sequence_includes
    params: {sequence: ["web_search", "fetch_url", "finish"]}
    critical: true
    description: "Must search, then fetch, then call finish in order"
  - check: answer_contains
    params: {substring: "38"}
    description: "Answer must state 38 kg"
  - check: stopped_reason
    params: {value: finish}
    description: "Must call finish()"
  - check: citations_fetched
    params: {}
    description: "All citations must be fetched"
  - check: answer_word_count_lte
    params: {n: 120}
    description: "Under 120 words"

soft_assertions:
  - metric: correctness
    rubric: rubrics/correctness.md
    threshold: 0.8
    weight: 1.0
    description: "38 kg is the correct mass per corpus"

id: happy_r1_payload
description: "Happy path: ask about R1 arm payload. Should find acme-r1-specs and answer '5 kg'."
tags: [happy_path, acme, specs]
input: "What is the maximum payload of the Acme R1 arm?"

hard_assertions:
  - check: tool_called
    params: {tool: web_search}
    description: "Must search before fetching"
  - check: tool_called
    params: {tool: fetch_url}
    description: "Must fetch a page before answering"
  - check: stopped_reason
    params: {value: finish}
    description: "Must call finish(), not time out"
  - check: answer_contains
    params: {substring: "5 kg"}
    description: "Answer must state the correct payload"
  - check: citations_fetched
    params: {}
    description: "Every cited URL must have been fetched via fetch_url"
  - check: answer_word_count_lte
    params: {n: 120}
    description: "System prompt requires answers under 120 words"

soft_assertions:
  - metric: correctness
    rubric: rubrics/correctness.md
    threshold: 0.8
    weight: 1.0
    description: "Answer is factually correct per acme-r1-specs corpus page"
